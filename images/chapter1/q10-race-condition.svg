<svg viewBox="0 0 680 340" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q10 counter++ 竞态条件</title><desc>线程A读(5)→加1(6)→暂写，线程B在其间也读(5)→加1(6)→写入→A的6覆盖B的6，最终只加1次</desc><rect x="0" y="0" width="680" height="340" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/><line x1="0" y1="332" x2="680" y2="332"/></g><line x1="44" y1="24" x2="44" y2="340" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q10 counter++ — 字节码层面的竞态</text><text x="60" y="60" font-family="serif" font-size="12" fill="#D85A30" font-weight="500">线程A</text><rect x="60" y="72" width="200" height="28" rx="3" fill="none" stroke="#D85A30" stroke-width="0.6"/><text x="160" y="90" font-family="monospace" font-size="10" fill="#2C2C2A" text-anchor="middle">getfield #counter → 读到5</text><rect x="60" y="108" width="200" height="28" rx="3" fill="none" stroke="#D85A30" stroke-width="0.6"/><text x="160" y="126" font-family="monospace" font-size="10" fill="#2C2C2A" text-anchor="middle">iconst_1 + iadd → 得到6</text><text x="270" y="90" font-family="serif" font-size="9" fill="#A32D2D">← A在此暂停</text><rect x="60" y="144" width="200" height="28" rx="3" fill="none" stroke="#D85A30" stroke-width="0.6" stroke-dasharray="2,2"/><text x="160" y="162" font-family="monospace" font-size="10" fill="#D85A30" text-anchor="middle">putfield #counter → 写6 !</text><text x="60" y="195" font-family="serif" font-size="12" fill="#185FA5" font-weight="500">线程B</text><rect x="60" y="208" width="200" height="28" rx="3" fill="none" stroke="#185FA5" stroke-width="0.6"/><text x="160" y="226" font-family="monospace" font-size="10" fill="#2C2C2A" text-anchor="middle">getfield → 也读到5(A还没写)</text><rect x="60" y="244" width="200" height="28" rx="3" fill="none" stroke="#185FA5" stroke-width="0.6"/><text x="160" y="262" font-family="monospace" font-size="10" fill="#2C2C2A" text-anchor="middle">iadd → 得到6</text><rect x="60" y="280" width="200" height="28" rx="3" fill="none" stroke="#185FA5" stroke-width="0.6" stroke-dasharray="2,2"/><text x="160" y="298" font-family="monospace" font-size="10" fill="#185FA5" text-anchor="middle">putfield → 写6 (A的写被覆盖!)</text><rect x="400" y="120" width="240" height="70" rx="4" fill="none" stroke="#A32D2D" stroke-width="1"/><text x="520" y="148" font-family="serif" font-size="18" fill="#A32D2D" text-anchor="middle" font-weight="500">counter 最终 = 6</text><text x="520" y="174" font-family="serif" font-size="13" fill="#A32D2D" text-anchor="middle">正确值应为 7 (5+1+1)</text><text x="400" y="220" font-family="serif" font-size="11" fill="#3B6D11" font-weight="500">解法：CAS循环(Java) / LOCK XADDQ(Go)</text><text x="400" y="244" font-family="serif" font-size="10" fill="#5F5E5A">AtomicInteger: while(!CAS(current, current+1)) 重试</text><text x="400" y="268" font-family="serif" font-size="10" fill="#5F5E5A">Go: LOCK XADDQ → 单条指令原子自增</text></svg>