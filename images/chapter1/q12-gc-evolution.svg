<svg viewBox="0 0 680 340" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q12 JVM GC 标记-复制 vs G1 vs ZGC</title><desc>标记-清除有碎片，标记-复制浪费一半内存更快，G1分代增量回收设定暂停目标，ZGC着色指针亚毫秒暂停</desc><rect x="0" y="0" width="680" height="340" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/><line x1="0" y1="332" x2="680" y2="332"/></g><line x1="44" y1="24" x2="44" y2="340" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q12 JVM GC — 三代垃圾回收器演进</text><rect x="44" y="54" width="175" height="120" rx="4" fill="none" stroke="#D85A30" stroke-width="0.6"/><text x="131" y="78" font-family="serif" font-size="13" fill="#D85A30" text-anchor="middle" font-weight="500">标记-清除</text><text x="131" y="100" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">从GC Roots遍历→标记活着</text><text x="131" y="118" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">回收垃圾→内存碎片化</text><text x="131" y="140" font-family="serif" font-size="10" fill="#A32D2D" text-anchor="middle">✗ 有碎片</text><text x="131" y="156" font-family="serif" font-size="10" fill="#A32D2D" text-anchor="middle">✗ 大对象分配失败</text><polyline points="219,114 256,114" fill="none" stroke="#5F5E5A" stroke-width="0.6"/><text x="238" y="108" font-family="serif" font-size="8" fill="#888780" text-anchor="middle">修复碎片</text><rect x="264" y="54" width="175" height="120" rx="4" fill="none" stroke="#185FA5" stroke-width="0.6"/><text x="351" y="78" font-family="serif" font-size="13" fill="#185FA5" text-anchor="middle" font-weight="500">标记-复制</text><text x="351" y="100" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">活对象搬到新空间→旧块全清</text><text x="351" y="118" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">无碎片·浪费50%空间</text><text x="351" y="140" font-family="serif" font-size="10" fill="#185FA5" text-anchor="middle">✓ 快 · 无碎片</text><text x="351" y="156" font-family="serif" font-size="10" fill="#A32D2D" text-anchor="middle">✗ 浪费一半内存</text><polyline points="439,114 476,114" fill="none" stroke="#5F5E5A" stroke-width="0.6"/><text x="458" y="108" font-family="serif" font-size="8" fill="#888780" text-anchor="middle">增量+可控</text><rect x="484" y="54" width="152" height="120" rx="4" fill="none" stroke="#3B6D11" stroke-width="0.6"/><text x="560" y="78" font-family="serif" font-size="13" fill="#3B6D11" text-anchor="middle" font-weight="500">G1 · 分代增量</text><text x="560" y="100" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Region划分 · 优先回收垃圾最多</text><text x="560" y="118" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">设定暂停目标 → 做不完留到下次</text><text x="560" y="140" font-family="serif" font-size="10" fill="#3B6D11" text-anchor="middle">✓ 暂停可控</text><text x="560" y="156" font-family="serif" font-size="10" fill="#3B6D11" text-anchor="middle">✓ 不浪费空间</text><text x="340" y="210" font-family="serif" font-size="18" fill="#7F77DD" text-anchor="middle" font-weight="500">→ ZGC：着色指针+读屏障，亚毫秒级暂停</text><text x="340" y="240" font-family="serif" font-size="11" fill="#5F5E5A" text-anchor="middle">从追求极致回收率 → 保证应用体验</text><text x="340" y="266" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">"结果的质量"vs"用户的体验"——和分布式系统的最终一致vs强一致相同的哲学</text></svg>