<svg viewBox="0 0 680 280" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q11 64位内存瓶颈链</title><desc>理论2^64字节，实际48位虚拟地址→CPU物理总线→内存控制器→DIMM密度→插槽数，每环都是瓶颈</desc><rect x="0" y="0" width="680" height="280" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/></g><line x1="44" y1="24" x2="44" y2="280" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q11 64位"16EB"→实际192GB — 瓶颈链条</text><rect x="44" y="50" width="175" height="46" rx="4" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4,2"/><text x="131" y="68" font-family="serif" font-size="12" fill="#D85A30" text-anchor="middle" font-weight="500">64位CPU → 16EB理论</text><text x="131" y="86" font-family="monospace" font-size="9" fill="#888780" text-anchor="middle">但只实现了48位虚拟地址</text><polyline points="219,73 260,73" fill="none" stroke="#5F5E5A" stroke-width="0.8"/><text x="240" y="66" font-family="serif" font-size="8" fill="#888780" text-anchor="middle">瓶颈1</text><rect x="268" y="50" width="145" height="46" rx="4" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4,2"/><text x="340" y="68" font-family="serif" font-size="11" fill="#D85A30" text-anchor="middle" font-weight="500">→ 物理地址总线 40bit</text><text x="340" y="86" font-family="monospace" font-size="9" fill="#888780" text-anchor="middle">消费者CPU: 128-256GB</text><polyline points="413,73 454,73" fill="none" stroke="#5F5E5A" stroke-width="0.8"/><text x="434" y="66" font-family="serif" font-size="8" fill="#888780" text-anchor="middle">瓶颈2</text><rect x="462" y="50" width="145" height="46" rx="4" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4,2"/><text x="534" y="68" font-family="serif" font-size="11" fill="#D85A30" text-anchor="middle" font-weight="500">→ DIMM插槽 2-4条</text><text x="534" y="86" font-family="monospace" font-size="9" fill="#888780" text-anchor="middle">单条最大: 128GB</text><text x="600" y="73" font-family="serif" font-size="16" fill="#A32D2D" text-anchor="start">→ 192GB</text><rect x="44" y="130" width="580" height="60" rx="4" fill="none" stroke="#3B6D11" stroke-width="0.6" stroke-dasharray="3,3"/><text x="334" y="154" font-family="serif" font-size="13" fill="#3B6D11" text-anchor="middle" font-weight="500">64位的真正价值不是"一次用16EB内存"——是每个进程拥有独立的巨大虚拟地址空间</text><text x="334" y="176" font-family="serif" font-size="11" fill="#5F5E5A" text-anchor="middle">不用像32位那样拮据地瓜分地址空间</text><text x="315" y="230" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">系统容量瓶颈 = min(CPU地址总线, 内存控制器, DIMM密度, 插槽数, 供电, 散热, ...)</text></svg>