<svg viewBox="0 0 680 340" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q15 树莓派Python操作GPIO</title><desc>Python通过mmap将/dev/mem映射到用户空间→直接读写GPIO控制器寄存器→操作引脚电平。普通电脑无法这样做因为寄存器被内核隐藏</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-linecap="round"/></marker></defs><rect x="0" y="0" width="680" height="340" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/><line x1="0" y1="332" x2="680" y2="332"/></g><line x1="44" y1="24" x2="44" y2="340" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q15 树莓派Python操作GPIO — 为什么能碰到硬件</text><rect x="44" y="55" width="120" height="36" rx="4" fill="none" stroke="#534AB7" stroke-width="0.8"/><text x="104" y="77" font-family="serif" font-size="12" fill="#534AB7" text-anchor="middle" font-weight="500">Python 代码</text><polyline points="164,73 210,73" fill="none" stroke="#5F5E5A" stroke-width="0.7" marker-end="url(#a)"/><rect x="220" y="55" width="140" height="36" rx="4" fill="none" stroke="#D85A30" stroke-width="0.8"/><text x="290" y="77" font-family="serif" font-size="11" fill="#D85A30" text-anchor="middle" font-weight="500">RPi.GPIO C库</text><polyline points="360,73 406,73" fill="none" stroke="#5F5E5A" stroke-width="0.7" marker-end="url(#a)"/><rect x="416" y="55" width="140" height="36" rx="4" fill="none" stroke="#1D9E75" stroke-width="0.8"/><text x="486" y="77" font-family="serif" font-size="11" fill="#1D9E75" text-anchor="middle" font-weight="500">mmap(/dev/mem)</text><polyline points="486,91 486,130" fill="none" stroke="#5F5E5A" stroke-width="0.7" marker-end="url(#a)"/><text x="498" y="115" font-family="serif" font-size="9" fill="#888780">内核建立映射</text><rect x="416" y="136" width="140" height="36" rx="4" fill="none" stroke="#185FA5" stroke-width="0.8"/><text x="486" y="158" font-family="serif" font-size="11" fill="#185FA5" text-anchor="middle" font-weight="500">用户态读写 映射地址</text><polyline points="486,172 486,210" fill="none" stroke="#5F5E5A" stroke-width="0.7" marker-end="url(#a)"/><text x="498" y="195" font-family="serif" font-size="9" fill="#888780">绕过内核驱动 直接操作寄存器</text><rect x="416" y="216" width="140" height="36" rx="4" fill="none" stroke="#3B6D11" stroke-width="0.8"/><text x="486" y="238" font-family="serif" font-size="11" fill="#3B6D11" text-anchor="middle" font-weight="500">GPIO寄存器 @0x3F200000</text><polyline points="486,252 486,280 270,280 270,256" fill="none" stroke="#3B6D11" stroke-width="0.7" marker-end="url(#a)"/><rect x="220" y="256" width="100" height="30" rx="4" fill="none" stroke="#3B6D11" stroke-width="0.8"/><text x="270" y="276" font-family="serif" font-size="12" fill="#3B6D11" text-anchor="middle" font-weight="500">LED 亮了!</text><text x="104" y="120" font-family="serif" font-size="10" fill="#888780" text-anchor="middle">普通电脑: GPIO控制器</text><text x="104" y="138" font-family="serif" font-size="10" fill="#A32D2D" text-anchor="middle">被ACPI/BIOS隐藏 ❌</text><text x="104" y="162" font-family="serif" font-size="10" fill="#888780" text-anchor="middle">树莓派: SoC直接暴露</text><text x="104" y="180" font-family="serif" font-size="10" fill="#3B6D11" text-anchor="middle">物理地址范围 ✅</text><text x="315" y="315" font-family="serif" font-size="10" fill="#B4B2A9" font-style="italic">同一行Python代码，内核暴露的物理内存范围决定了你能否碰到硬件</text></svg>