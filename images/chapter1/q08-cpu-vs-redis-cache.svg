<svg viewBox="0 0 680 360" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q8 CPU缓存 vs Redis缓存</title><desc>CPU缓存硬件透明自动，Redis缓存软件显式可控。左边是硬件层自动做一切，右边是你手动管TTL和淘汰策略</desc><rect x="0" y="0" width="680" height="360" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/><line x1="0" y1="332" x2="680" y2="332"/></g><line x1="44" y1="24" x2="44" y2="360" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><line x1="340" y1="38" x2="340" y2="345" stroke="#888780" stroke-width="0.5" stroke-dasharray="3,6"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q8 两种缓存</text><text x="170" y="58" font-family="serif" font-size="15" fill="#D85A30" text-anchor="middle" font-weight="500">CPU 缓存</text><text x="510" y="58" font-family="serif" font-size="15" fill="#185FA5" text-anchor="middle" font-weight="500">Redis / 软件缓存</text><text x="170" y="88" font-family="serif" font-size="12" fill="#5F5E5A" text-anchor="middle">硬件级 · 完全透明</text><text x="510" y="88" font-family="serif" font-size="12" fill="#5F5E5A" text-anchor="middle">软件级 · 完全可控</text><rect x="44" y="108" width="252" height="70" rx="3" fill="none" stroke="#D85A30" stroke-width="0.5"/><text x="170" y="128" font-family="serif" font-size="11" fill="#2C2C2A" text-anchor="middle">同一个 mov 指令</text><text x="170" y="148" font-family="serif" font-size="11" fill="#2C2C2A" text-anchor="middle">可能1ns完成 也可能100ns完成</text><text x="170" y="168" font-family="serif" font-size="10" fill="#A32D2D" text-anchor="middle">你无法干预 · 淘汰策略焊死在硅片上</text><rect x="350" y="108" width="252" height="70" rx="3" fill="none" stroke="#185FA5" stroke-width="0.5"/><text x="476" y="128" font-family="serif" font-size="11" fill="#2C2C2A" text-anchor="middle">你决定 TTL、淘汰策略</text><text x="476" y="148" font-family="serif" font-size="11" fill="#2C2C2A" text-anchor="middle">预加载、主动刷新、打穿回源</text><text x="476" y="168" font-family="serif" font-size="10" fill="#185FA5" text-anchor="middle">完全可控 · 但要你每步自己管理</text><text x="170" y="210" font-family="serif" font-size="12" fill="#D85A30" text-anchor="middle" font-weight="500">间接优化：按行访问 vs 按列访问</text><text x="170" y="234" font-family="serif" font-size="11" fill="#5F5E5A" text-anchor="middle">缓存命中率差几个数量级</text><text x="510" y="210" font-family="serif" font-size="12" fill="#185FA5" text-anchor="middle" font-weight="500">直接优化：TTL+LRU+Caffeine</text><text x="510" y="234" font-family="serif" font-size="11" fill="#5F5E5A" text-anchor="middle">精细调参，每个场景不同策略</text><text x="340" y="300" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">同是"缓存"，一个是自动呼吸，一个是主动收纳盒——透明性 vs 可控性的永恒拉扯</text></svg>