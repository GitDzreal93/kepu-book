<svg viewBox="0 0 680 220" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q14 大端vs小端</title><desc>0x12345678在大端内存中为12 34 56 78(从左读)，在小端中为78 56 34 12(从右读)。网络协议统一用大端</desc><rect x="0" y="0" width="680" height="220" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/></g><text x="315" y="26" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q14 0x12345678 在内存中的两种排列</text><line x1="340" y1="36" x2="340" y2="210" stroke="#888780" stroke-width="0.5" stroke-dasharray="3,6"/><text x="170" y="60" font-family="serif" font-size="14" fill="#D85A30" text-anchor="middle" font-weight="500">大端 (Big Endian)</text><text x="170" y="80" font-family="serif" font-size="11" fill="#5F5E5A" text-anchor="middle">最高有效字节在最低地址</text><rect x="68" y="96" width="40" height="34" rx="2" fill="none" stroke="#D85A30" stroke-width="0.8"/><rect x="108" y="96" width="40" height="34" rx="2" fill="none" stroke="#D85A30" stroke-width="0.8"/><rect x="148" y="96" width="40" height="34" rx="2" fill="none" stroke="#D85A30" stroke-width="0.8"/><rect x="188" y="96" width="40" height="34" rx="2" fill="none" stroke="#D85A30" stroke-width="0.8"/><text x="88" y="118" font-family="monospace" font-size="13" fill="#D85A30" text-anchor="middle">12</text><text x="128" y="118" font-family="monospace" font-size="13" fill="#D85A30" text-anchor="middle">34</text><text x="168" y="118" font-family="monospace" font-size="13" fill="#D85A30" text-anchor="middle">56</text><text x="208" y="118" font-family="monospace" font-size="13" fill="#D85A30" text-anchor="middle">78</text><text x="148" y="152" font-family="serif" font-size="10" fill="#D85A30" text-anchor="middle">人类阅读顺序 → 网络协议使用</text><text x="510" y="60" font-family="serif" font-size="14" fill="#185FA5" text-anchor="middle" font-weight="500">小端 (Little Endian)</text><text x="510" y="80" font-family="serif" font-size="11" fill="#5F5E5A" text-anchor="middle">最低有效字节在最低地址</text><rect x="408" y="96" width="40" height="34" rx="2" fill="none" stroke="#185FA5" stroke-width="0.8"/><rect x="448" y="96" width="40" height="34" rx="2" fill="none" stroke="#185FA5" stroke-width="0.8"/><rect x="488" y="96" width="40" height="34" rx="2" fill="none" stroke="#185FA5" stroke-width="0.8"/><rect x="528" y="96" width="40" height="34" rx="2" fill="none" stroke="#185FA5" stroke-width="0.8"/><text x="428" y="118" font-family="monospace" font-size="13" fill="#185FA5" text-anchor="middle">78</text><text x="468" y="118" font-family="monospace" font-size="13" fill="#185FA5" text-anchor="middle">56</text><text x="508" y="118" font-family="monospace" font-size="13" fill="#185FA5" text-anchor="middle">34</text><text x="548" y="118" font-family="monospace" font-size="13" fill="#185FA5" text-anchor="middle">12</text><text x="488" y="152" font-family="serif" font-size="10" fill="#185FA5" text-anchor="middle">x86/x86-64 · 低地址取低位更快</text><text x="340" y="190" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">高级语言抽象了端序 · 你只在网络编程/二进制解析时才会碰到它</text></svg>