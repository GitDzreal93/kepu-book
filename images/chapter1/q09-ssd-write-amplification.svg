<svg viewBox="0 0 680 360" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q9 SSD写入放大</title><desc>SSD不能原地覆写→修改4KB页时标记旧页为陈旧→新位置写入→GC搬迁有效页→实际写入量远大于用户写入量</desc><rect x="0" y="0" width="680" height="360" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/><line x1="0" y1="332" x2="680" y2="332"/></g><line x1="44" y1="24" x2="44" y2="360" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q9 SSD写入放大 — 为什么SSD越写越慢</text><text x="44" y="64" font-family="serif" font-size="12" fill="#2C2C2A" font-weight="500">用户写入 1GB 日志文件</text><rect x="44" y="80" width="130" height="36" rx="3" fill="none" stroke="#185FA5" stroke-width="0.6"/><text x="109" y="102" font-family="serif" font-size="13" fill="#185FA5" text-anchor="middle" font-weight="500">用户: 写入1GB</text><polyline points="174,98 230,98" fill="none" stroke="#5F5E5A" stroke-width="0.6"/><text x="202" y="92" font-family="serif" font-size="9" fill="#888780" text-anchor="middle">SSD内部到底写了多少?</text><rect x="240" y="80" width="200" height="36" rx="3" fill="none" stroke="#D85A30" stroke-width="0.6"/><text x="340" y="102" font-family="serif" font-size="13" fill="#D85A30" text-anchor="middle" font-weight="500">实际: 写入 ~3GB</text><text x="240" y="60" font-family="serif" font-size="9" fill="#A32D2D">写入放大=3x</text><rect x="44" y="140" width="200" height="90" rx="3" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3,3"/><text x="144" y="164" font-family="serif" font-size="12" fill="#D85A30" text-anchor="middle" font-weight="500">为什么?</text><text x="144" y="184" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">不能原地覆写</text><text x="144" y="200" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">→ 新位置写 + 旧位置标记无效</text><text x="144" y="216" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">→ 空闲块不够→GC启动</text><text x="144" y="232" font-family="serif" font-size="10" fill="#A32D2D" text-anchor="middle">→ 搬迁有效页=额外写入</text><rect x="280" y="140" width="160" height="90" rx="3" fill="none" stroke="#3B6D11" stroke-width="0.5" stroke-dasharray="3,3"/><text x="360" y="164" font-family="serif" font-size="12" fill="#3B6D11" text-anchor="middle" font-weight="500">缓解方案</text><text x="360" y="184" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">顺序写(Kafka风格)</text><text x="360" y="200" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">TRIM指令通知SSD</text><text x="360" y="216" font-family="serif" font-size="10" fill="#5F5E5A" text-anchor="middle">预留20-30% OP空间</text><text x="315" y="280" font-family="serif" font-size="12" fill="#2C2C2A" text-anchor="middle" font-weight="500">SSD的掉速不是bug——是"不能原地覆写"这个物理约束的系统级代价</text><text x="315" y="310" font-family="serif" font-size="18" fill="#D85A30" text-anchor="middle">写入放大 = SSD内部总写入 / 用户写入</text></svg>