<svg viewBox="0 0 680 420" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q6 数组越界 四语言对比</title><desc>Java有数组长度元数据→抛异常；Go编译器插边界检查→panic；C无元数据无检查→静默破坏内存；Python有检查→IndexError</desc><rect x="0" y="0" width="680" height="420" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/><line x1="0" y1="332" x2="680" y2="332"/><line x1="0" y1="356" x2="680" y2="356"/><line x1="0" y1="380" x2="680" y2="380"/><line x1="0" y1="404" x2="680" y2="404"/></g><line x1="44" y1="24" x2="44" y2="420" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q6 数组越界 — 四种语言的安全层级</text>
<rect x="24" y="52" width="140" height="310" rx="5" fill="none" stroke="#185FA5" stroke-width="0.6"/><text x="94" y="80" font-family="serif" font-size="14" fill="#185FA5" text-anchor="middle" font-weight="500">Java</text><line x1="34" y1="92" x2="154" y2="92" stroke="#E5E0D5" stroke-width="0.3"/><text x="94" y="118" font-family="monospace" font-size="10" fill="#5F5E5A" text-anchor="middle">[对象头 | 长度10 | arr[0..9]]</text><text x="94" y="146" font-family="serif" font-size="11" fill="#185FA5" text-anchor="middle">arr[30] → JVM检查</text><text x="94" y="170" font-family="serif" font-size="11" fill="#185FA5" text-anchor="middle">→ ArrayIndexOutOfBounds</text><text x="94" y="200" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">代价：每次访问过海关</text>
<rect x="184" y="52" width="140" height="310" rx="5" fill="none" stroke="#1D9E75" stroke-width="0.6"/><text x="254" y="80" font-family="serif" font-size="14" fill="#1D9E75" text-anchor="middle" font-weight="500">Go</text><line x1="194" y1="92" x2="314" y2="92" stroke="#E5E0D5" stroke-width="0.3"/><text x="254" y="118" font-family="monospace" font-size="10" fill="#5F5E5A" text-anchor="middle">[10个int · 80字节] 纯数据</text><text x="254" y="146" font-family="serif" font-size="11" fill="#1D9E75" text-anchor="middle">编译器插边界检查</text><text x="254" y="170" font-family="serif" font-size="11" fill="#1D9E75" text-anchor="middle">→ panic runtime error</text><text x="254" y="200" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">BCE优化：可证明安全时跳过</text>
<rect x="344" y="52" width="140" height="310" rx="5" fill="none" stroke="#A32D2D" stroke-width="0.6"/><text x="414" y="80" font-family="serif" font-size="14" fill="#A32D2D" text-anchor="middle" font-weight="500">C</text><line x1="354" y1="92" x2="474" y2="92" stroke="#E5E0D5" stroke-width="0.3"/><text x="414" y="118" font-family="monospace" font-size="10" fill="#5F5E5A" text-anchor="middle">[10个int] arr=首地址指针</text><text x="414" y="146" font-family="serif" font-size="11" fill="#A32D2D" text-anchor="middle">arr[30] = *(arr+120B)</text><text x="414" y="170" font-family="serif" font-size="11" fill="#A32D2D" text-anchor="middle">无检查→段错误 or 静默破坏</text><text x="414" y="200" font-family="serif" font-size="11" fill="#A32D2D" text-anchor="middle">代价：你要自己负责</text>
<rect x="504" y="52" width="140" height="310" rx="5" fill="none" stroke="#7F77DD" stroke-width="0.6"/><text x="574" y="80" font-family="serif" font-size="14" fill="#7F77DD" text-anchor="middle" font-weight="500">Python</text><line x1="514" y1="92" x2="634" y2="92" stroke="#E5E0D5" stroke-width="0.3"/><text x="574" y="118" font-family="monospace" font-size="10" fill="#5F5E5A" text-anchor="middle">list对象 · PyObject数组</text><text x="574" y="146" font-family="serif" font-size="11" fill="#7F77DD" text-anchor="middle">lst[30] → PyList_GetItem</text><text x="574" y="170" font-family="serif" font-size="11" fill="#7F77DD" text-anchor="middle">→ IndexError</text><text x="574" y="200" font-family="serif" font-size="11" fill="#888780" text-anchor="middle">代价：每次操作都经过C层</text>
<text x="44" y="400" font-family="serif" font-size="9" fill="#B4B2A9" font-style="italic">抽象层级越高越安全但越慢。选择语言=选择"花多少运行时开销换取多大程度的'不可能犯这类错'的保证"。</text></svg>