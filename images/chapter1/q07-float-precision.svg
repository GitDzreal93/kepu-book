<svg viewBox="0 0 680 320" width="100%" role="img" xmlns="http://www.w3.org/2000/svg"><title>Q7 0.1+0.2 浮点数精度</title><desc>0.1在二进制中是无限循环小数，IEEE754双精度截断后产生误差，0.1+0.2的近似和≠0.3的近似</desc><rect x="0" y="0" width="680" height="320" rx="4" fill="#F9F7F0"/><g stroke="#E5E0D5" stroke-width="0.3"><line x1="0" y1="20" x2="680" y2="20"/><line x1="0" y1="44" x2="680" y2="44"/><line x1="0" y1="68" x2="680" y2="68"/><line x1="0" y1="92" x2="680" y2="92"/><line x1="0" y1="116" x2="680" y2="116"/><line x1="0" y1="140" x2="680" y2="140"/><line x1="0" y1="164" x2="680" y2="164"/><line x1="0" y1="188" x2="680" y2="188"/><line x1="0" y1="212" x2="680" y2="212"/><line x1="0" y1="236" x2="680" y2="236"/><line x1="0" y1="260" x2="680" y2="260"/><line x1="0" y1="284" x2="680" y2="284"/><line x1="0" y1="308" x2="680" y2="308"/></g><line x1="44" y1="24" x2="44" y2="320" stroke="#FF8B8B" stroke-width="0.8" stroke-dasharray="2,4"/><text x="315" y="30" font-family="serif" font-size="14" fill="#2C2C2A" text-anchor="middle" font-style="italic">Q7 0.1 + 0.2 ≠ 0.3 — IEEE 754精度陷阱</text><text x="44" y="68" font-family="serif" font-size="12" fill="#2C2C2A" font-weight="500">十进制 0.1 在二进制中是：</text><text x="44" y="96" font-family="monospace" font-size="13" fill="#D85A30">0.0001100110011001100110011001100110011... (无限循环)</text><text x="44" y="128" font-family="serif" font-size="12" fill="#2C2C2A" font-weight="500">IEEE754 double (64位) 存储 0.1 时，截断到52位尾数：</text><rect x="44" y="144" width="600" height="36" rx="3" fill="none" stroke="#A32D2D" stroke-width="0.6" stroke-dasharray="3,3"/><text x="344" y="166" font-family="monospace" font-size="11" fill="#A32D2D" text-anchor="middle">存储为: 0.1000000000000000055511151231257827021181583...</text><text x="44" y="210" font-family="serif" font-size="12" fill="#2C2C2A" font-weight="500">近似 0.1 + 近似 0.2 ≈ 近似 0.3，但三个都不是精确值：</text><rect x="44" y="230" width="600" height="40" rx="3" fill="none" stroke="#A32D2D" stroke-width="0.6" stroke-dasharray="3,3"/><text x="344" y="250" font-family="monospace" font-size="13" fill="#A32D2D" text-anchor="middle">0.1(近似) + 0.2(近似) = 0.30000000000000004 ≠ 0.3(近似)</text><text x="44" y="295" font-family="serif" font-size="11" fill="#3B6D11" font-weight="500">解法：BigDecimal(精确但慢) / 存"分"用整数(快但有截断) / 定点数库(平衡)</text></svg>