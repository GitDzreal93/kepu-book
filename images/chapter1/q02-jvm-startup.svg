  <text x="340" y="342" font-family="monospace" font-size="9" fill="#5F5E5A" text-anchor="middle">main()вҶ’зғӯзӮ№жЈҖжөӢвҶ’C1/C2зј–иҜ‘дёәжңәеҷЁз Ғ</text>
  <polyline points="340,352 340,382" fill="none" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#a)"/>

