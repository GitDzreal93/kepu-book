  <text x="340" y="406" font-family="serif" font-size="13" fill="#3B6D11" text-anchor="middle" font-weight="500">write(1, "hello world\n", 12)</text>
  <text x="340" y="424" font-family="monospace" font-size="9" fill="#5F5E5A" text-anchor="middle">fd=1 ж ҮеҮҶиҫ“еҮә вҶ’ з»Ҳз«Ҝй©ұеҠЁ вҶ’ еұҸе№•</text>

  <text x="44" y="464" font-family="serif" font-size="9" fill="#B4B2A9" font-style="italic">Goзј–иҜ‘дёәйқҷжҖҒELFзӣҙжҺҘеҠ иҪҪжү§иЎҢпјҢж— йңҖJVMиҝҷдёҖж•ҙеҘ—иҝҗиЎҢж—¶зҡ„еҗҜеҒңејҖй”ҖгҖӮJavaзҡ„дёҖж¬Ўзј–иҜ‘еҲ°еӨ„иҝҗиЎҢд»Јд»·жҳҜиҝҷ6еұӮжҠҪиұЎгҖӮ</text>
